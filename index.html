<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>HIREPRO V27 - PT Sepatu Indonesia</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;700;800&display=swap');
        * { font-family: 'Plus Jakarta Sans', sans-serif; -webkit-tap-highlight-color: transparent; }
        body { background-color: #f8fafc; margin: 0; }
        .teal-theme { background: #1abc9c; }
    </style>
</head>
<body>
    <div id="root"></div>
    <script type="text/babel">
        const { useState, useEffect } = React;

        const firebaseConfig = {
            apiKey: "AIzaSyAg2NSb0rqD6BNtu96_7VJezhGiUlYyIZM",
            authDomain: "hire-1a51d.firebaseapp.com",
            projectId: "hire-1a51d",
            storageBucket: "hire-1a51d.firebasestorage.app",
            messagingSenderId: "370568295",
            appId: "1:370568295:web:a0d38b16b3bde89cbbf8c2"
        };

        if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();
        const auth = firebase.auth();
        const APP_ID = "hire-v27-final";

        function App() {
            const [view, setView] = useState('login');
            const [user, setUser] = useState(null);
            const [email, setEmail] = useState('');
            const [pass, setPass] = useState('');
            const [name, setName] = useState('');
            const [authMode, setAuthMode] = useState('signup');
            const [loading, setLoading] = useState(false);

            useEffect(() => {
                const unsub = auth.onAuthStateChanged((u) => {
                    if (u) {
                        setUser(u);
                        setView('dashboard');
                    } else {
                        setView('login');
                    }
                });
                return () => unsub();
            }, []);

            const handleAuth = async (e) => {
                e.preventDefault();
                setLoading(true);
                try {
                    if (authMode === 'signup') {
                        const res = await auth.createUserWithEmailAndPassword(email, pass);
                        await db.collection('artifacts').doc(APP_ID).collection('users').doc(res.user.uid).set({
                            uid: res.user.uid, name, email, role: 'user'
                        });
                    } else {
                        await auth.signInWithEmailAndPassword(email, pass);
                    }
                } catch (err) { 
                    // Tampilkan pesan error asli dari Firebase agar Anda tahu masalahnya
                    alert("SISTEM: " + err.message); 
                }
                setLoading(false);
            };

            if (view === 'login') return (
                <div className="min-h-screen p-10 flex flex-col justify-center max-w-md mx-auto bg-white">
                    <div className="text-center mb-10">
                        <div className="text-5xl mb-4 text-center w-full">💼</div>
                        <h2 className="text-2xl font-black text-slate-800 uppercase tracking-tighter">Portal Rekrutmen</h2>
                        <p className="text-[10px] font-bold text-slate-400 mt-1 uppercase tracking-widest">{authMode === 'signup' ? 'Daftar Akun Baru' : 'Silakan Masuk'}</p>
                    </div>
                    <form className="space-y-4" onSubmit={handleAuth}>
                        {authMode === 'signup' && <input className="w-full p-4 bg-slate-50 border rounded-2xl outline-none text-sm" placeholder="Nama Lengkap" value={name} onChange={e => setName(e.target.value)} required />}
                        <input className="w-full p-4 bg-slate-50 border rounded-2xl outline-none text-sm" type="email" placeholder="Email (Contoh: user@gmail.com)" value={email} onChange={e => setEmail(e.target.value)} required />
                        <input className="w-full p-4 bg-slate-50 border rounded-2xl outline-none text-sm" type="password" placeholder="Password (Min. 6 Karakter)" value={pass} onChange={e => setPass(e.target.value)} required />
                        <button type="submit" className="w-full teal-theme text-white font-black py-4 rounded-3xl shadow-xl uppercase text-xs">
                            {loading ? 'MEMPROSES...' : (authMode === 'signup' ? 'DAFTAR SEKARANG' : 'MASUK KE DASHBOARD')}
                        </button>
                    </form>
                    <button onClick={() => setAuthMode(authMode === 'signup' ? 'login' : 'signup')} className="mt-8 text-[10px] font-black text-slate-300 uppercase underline block mx-auto">
                        {authMode === 'signup' ? 'Sudah punya akun? Login' : 'Belum punya akun? Daftar'}
                    </button>
                </div>
            );

            if (view === 'dashboard') return (
                <div className="min-h-screen bg-slate-50 max-w-md mx-auto p-10 text-center">
                    <div className="text-6xl mb-6">✅</div>
                    <h2 className="text-2xl font-black text-slate-800 uppercase italic">Berhasil Masuk!</h2>
                    <p className="text-sm text-slate-500 mt-2">Selamat datang di sistem rekrutmen.</p>
                    <button onClick={() => auth.signOut()} className="mt-10 w-full py-4 border-2 border-red-500 text-red-500 font-black rounded-2xl uppercase text-[10px]">Logout</button>
                </div>
            );

            return null;
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>


```
