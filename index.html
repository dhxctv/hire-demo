<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>HIREPRO - Live Demo</title>
    
    <!-- CSS Terpercaya -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- Library Tanpa Babel (Menggunakan htm untuk render cepat di HP) -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/htm@3.1.1/dist/htm.umd.js"></script>

    <!-- Firebase Compat -->
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@700;800&display=swap');
        * { font-family: 'Plus Jakarta Sans', sans-serif; -webkit-tap-highlight-color: transparent; }
        .teal-bg { background-color: #1abc9c; }
        .teal-text { color: #1abc9c; }
    </style>
</head>
<body class="bg-slate-50">
    <div id="root"></div>

    <script>
        const { useState, useEffect } = React;
        const html = htm.bind(React.createElement);

        // CONFIG ANDA
        const firebaseConfig = {
            apiKey: "AIzaSyAg2NSb0rqD6BNtu96_7VJezhGiUlYyIZM",
            authDomain: "hire-1a51d.firebaseapp.com",
            projectId: "hire-1a51d",
            storageBucket: "hire-1a51d.firebasestorage.app",
            messagingSenderId: "370568295",
            appId: "1:370568295:web:a0d38b16b3bde89cbbf8c2"
        };

        // Init Firebase secara aman
        let auth, db;
        try {
            if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
            auth = firebase.auth();
            db = firebase.firestore();
        } catch (e) { console.error("Firebase fail:", e); }

        function App() {
            const [view, setView] = useState('login'); // login, dashboard, admin, form
            const [isDemo, setIsDemo] = useState(false);
            const [email, setEmail] = useState('');
            const [pass, setPass] = useState('');
            const [authMode, setAuthMode] = useState('signup');

            const handleAuth = async (e) => {
                e.preventDefault();
                if (isDemo) {
                    setView(email.includes('admin') ? 'admin' : 'dashboard');
                    return;
                }
                
                try {
                    if (authMode === 'signup') {
                        await auth.createUserWithEmailAndPassword(email, pass);
                    } else {
                        await auth.signInWithEmailAndPassword(email, pass);
                    }
                } catch (err) {
                    alert("DATABASE ERROR: " + err.message + "\n\nTips: Gunakan 'Mode Demo' jika database belum aktif.");
                }
            };

            // UI LOGIN
            const LoginView = () => html`
                <div class="min-h-screen flex flex-col items-center justify-center p-8 bg-white">
                    <div class="w-full max-w-sm text-center">
                        <div class="text-6xl mb-4">👟</div>
                        <h1 class="text-3xl font-black tracking-tighter text-slate-800 uppercase leading-none">HirePro</h1>
                        <p class="text-[10px] font-bold text-slate-400 uppercase tracking-widest mb-10">Pabrik Sepatu System</p>
                        
                        <form onSubmit=${handleAuth} class="space-y-4">
                            <input class="w-full p-4 bg-slate-50 border border-slate-100 rounded-2xl outline-none text-sm" placeholder="Email" value=${email} onChange=${e => setEmail(e.target.value)} required />
                            <input class="w-full p-4 bg-slate-50 border border-slate-100 rounded-2xl outline-none text-sm" type="password" placeholder="Password" value=${pass} onChange=${e => setPass(e.target.value)} required />
                            <button type="submit" class="w-full teal-bg text-white py-4 rounded-3xl shadow-lg uppercase text-xs font-black tracking-widest">
                                ${authMode === 'signup' ? 'Daftar Sekarang' : 'Masuk Dashboard'}
                            </button>
                        </form>

                        <button onClick=${() => setAuthMode(authMode === 'signup' ? 'login' : 'signup')} class="mt-6 text-[10px] font-bold text-slate-300 underline uppercase block mx-auto">
                            ${authMode === 'signup' ? 'Sudah punya akun? Login' : 'Belum punya akun? Daftar'}
                        </button>

                        <div class="mt-12 p-4 bg-orange-50 rounded-2xl border border-orange-100">
                            <p class="text-[9px] text-orange-400 font-bold uppercase mb-2">Masalah Koneksi?</p>
                            <button onClick=${() => { setIsDemo(true); setEmail('admin@demo.com'); setPass('123456'); }} class="text-[10px] bg-orange-500 text-white px-4 py-2 rounded-full font-bold uppercase">Aktifkan Mode Demo</button>
                        </div>
                    </div>
                </div>
            `;

            // UI DASHBOARD PELAMAR
            const UserDashboard = () => html`
                <div class="min-h-screen bg-slate-50">
                    <div class="teal-bg text-white p-10 pt-16 rounded-b-[3rem] text-center shadow-xl">
                        <div class="text-5xl mb-4">👤</div>
                        <h2 class="text-2xl font-black uppercase tracking-tight">${email}</h2>
                        <p class="text-[10px] font-bold opacity-60 uppercase tracking-widest">Pelamar Aktif ${isDemo ? '(DEMO)' : ''}</p>
                    </div>
                    <div class="p-8 space-y-4">
                        <div class="bg-white p-6 rounded-3xl border shadow-sm flex items-center justify-between">
                            <div class="text-left"><h3 class="font-black text-sm text-slate-800 uppercase">Kirim Lamaran</h3><p class="text-[10px] text-slate-400 italic">Pilih posisi kerja</p></div>
                            <div class="text-2xl">📝</div>
                        </div>
                        <button onClick=${() => window.location.reload()} class="w-full py-4 text-red-500 font-black uppercase text-[10px] mt-10">Logout</button>
                    </div>
                </div>
            `;

            // UI ADMIN
            const AdminDashboard = () => html`
                <div class="min-h-screen bg-slate-50">
                    <div class="bg-slate-900 text-white p-10 pt-16 rounded-b-[3rem] text-center shadow-xl">
                        <h2 class="text-2xl font-black uppercase tracking-tighter italic">Admin Control</h2>
                        <p class="text-[10px] font-bold opacity-30 uppercase tracking-widest mt-2 italic">PT Sepatu Indonesia ${isDemo ? '(DEMO)' : ''}</p>
                    </div>
                    <div class="p-8">
                        <h3 class="text-[10px] font-black text-slate-400 uppercase tracking-widest ml-2 mb-4">Pelamar Masuk</h3>
                        <div class="bg-white p-5 rounded-3xl border shadow-sm flex items-center justify-between mb-3">
                            <div class="flex items-center gap-3">
                                <div class="w-10 h-10 bg-teal-50 text-teal-500 rounded-xl flex items-center justify-center font-black">D</div>
                                <div><h4 class="font-bold text-sm text-slate-800 leading-none mb-1 uppercase">Dey (Contoh)</h4><p class="text-[9px] text-blue-600 font-bold uppercase">Operator Sewing</p></div>
                            </div>
                            <div class="text-xl">📞</div>
                        </div>
                        <button onClick=${() => window.location.reload()} class="w-full py-4 text-red-500 font-black uppercase text-[10px] mt-10">Logout Admin</button>
                    </div>
                </div>
            `;

            if (view === 'dashboard') return UserDashboard();
            if (view === 'admin') return AdminDashboard();
            return LoginView();
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(React.createElement(App));
    </script>
</body>
</html>

```
