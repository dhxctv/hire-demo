<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>HIREPRO V26 - PT Sepatu Indonesia</title>
    
    <!-- 1. LIBRARY DASAR -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <!-- 2. FIREBASE STABIL -->
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;700;800&display=swap');
        * { font-family: 'Plus Jakarta Sans', sans-serif; -webkit-tap-highlight-color: transparent; }
        body { background-color: #f1f5f9; margin: 0; padding: 0; }
        .teal-theme { background: #1abc9c; }
        .teal-text { color: #1abc9c; }
        #debug-log { position: fixed; bottom: 0; left: 0; right: 0; height: 50px; background: #000; color: #0f0; font-family: monospace; font-size: 9px; overflow-y: auto; padding: 5px; z-index: 9999; opacity: 0.8; pointer-events: none; }
    </style>
</head>
<body>
    <div id="root"></div>
    <div id="debug-log">Memulai V26...</div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        // Fungsi Log untuk melacak error di layar HP
        const addLog = (m) => {
            const el = document.getElementById('debug-log');
            if (el) el.innerHTML += `<br/>> ${m}`;
        };

        // --- CONFIG FIREBASE ANDA ---
        const firebaseConfig = {
            apiKey: "AIzaSyAg2NSb0rqD6BNtu96_7VJezhGiUlYyIZM",
            authDomain: "hire-1a51d.firebaseapp.com",
            projectId: "hire-1a51d",
            storageBucket: "hire-1a51d.firebasestorage.app",
            messagingSenderId: "370568295",
            appId: "1:370568295:web:a0d38b16b3bde89cbbf8c2"
        };

        // Inisialisasi
        if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();
        const auth = firebase.auth();
        const APP_ID = "hire-v26-final";

        function App() {
            const [view, setView] = useState('splash');
            const [user, setUser] = useState(null);
            const [profile, setProfile] = useState(null);
            const [loading, setLoading] = useState(false);

            // Form Buffers
            const [email, setEmail] = useState('');
            const [pass, setPass] = useState('');
            const [name, setName] = useState('');
            const [authMode, setAuthMode] = useState('login');

            useEffect(() => {
                addLog("Aplikasi Siap.");
                const unsub = auth.onAuthStateChanged(async (u) => {
                    addLog("Cek Auth...");
                    if (u) {
                        addLog("Login: " + u.email);
                        setUser(u);
                        try {
                            const snap = await db.collection('artifacts').doc(APP_ID).collection('users').doc(u.uid).get();
                            if (snap.exists) {
                                setProfile(snap.data());
                                setView(snap.data().role === 'admin' ? 'admin_db' : 'user_db');
                            } else {
                                setView('user_db');
                            }
                        } catch (e) { addLog("DB Error: " + e.message); }
                    } else {
                        addLog("Belum login. Ke Login Page.");
                        setTimeout(() => setView('login'), 1000);
                    }
                });
                return () => unsub();
            }, []);

            const handleAuth = async (e) => {
                e.preventDefault();
                setLoading(true);
                addLog("Proses " + authMode + "...");
                try {
                    if (authMode === 'signup') {
                        const res = await auth.createUserWithEmailAndPassword(email, pass);
                        const pData = { uid: res.user.uid, name, email, role: 'user' };
                        await db.collection('artifacts').doc(APP_ID).collection('users').doc(res.user.uid).set(pData);
                        setProfile(pData);
                    } else {
                        await auth.signInWithEmailAndPassword(email, pass);
                    }
                } catch (err) { 
                    alert(err.message); 
                    addLog("Error: " + err.message);
                }
                setLoading(false);
            };

            // Switcher Tampilan
            return (
                <div className="max-w-md mx-auto min-h-screen bg-white relative">
                    
                    {/* 1. Splash Screen */}
                    {view === 'splash' && (
                        <div className="h-screen teal-theme flex flex-col items-center justify-center text-white p-10 text-center">
                            <div className="text-6xl mb-4">👟</div>
                            <h1 className="text-3xl font-black tracking-tighter">HIREPRO</h1>
                            <p className="text-[10px] font-bold tracking-[0.4em] opacity-50 uppercase mt-2">Pabrik Sepatu System</p>
                        </div>
                    )}

                    {/* 2. Login Screen */}
                    {view === 'login' && (
                        <div className="min-h-screen p-10 flex flex-col justify-center">
                            <div className="text-center mb-10">
                                <div className="text-5xl mb-4">💼</div>
                                <h2 className="text-2xl font-black text-slate-800 tracking-tighter uppercase">Portal Rekrutmen</h2>
                                <p className="text-[10px] font-bold text-slate-400 mt-1 uppercase tracking-widest">Silakan Masuk</p>
                            </div>
                            <form className="space-y-4" onSubmit={handleAuth}>
                                {authMode === 'signup' && <input className="w-full p-4 bg-slate-50 border rounded-2xl outline-none text-sm" placeholder="Nama Lengkap" value={name} onChange={e => setName(e.target.value)} required />}
                                <input className="w-full p-4 bg-slate-50 border rounded-2xl outline-none text-sm" type="email" placeholder="Email" value={email} onChange={e => setEmail(e.target.value)} required />
                                <input className="w-full p-4 bg-slate-50 border rounded-2xl outline-none text-sm" type="password" placeholder="Password" value={pass} onChange={e => setPass(e.target.value)} required />
                                <button type="submit" className="w-full teal-theme text-white font-black py-4 rounded-3xl shadow-xl uppercase text-xs">
                                    {authMode === 'login' ? 'MASUK' : 'DAFTAR'}
                                </button>
                            </form>
                            <button onClick={() => setAuthMode(authMode === 'login' ? 'signup' : 'login')} className="mt-8 text-[10px] font-black text-slate-300 uppercase underline block mx-auto">{authMode === 'login' ? 'Buat Akun Pelamar' : 'Sudah punya akun? Login'}</button>
                        </div>
                    )}

                    {/* 3. User Dashboard */}
                    {view === 'user_db' && (
                        <div className="min-h-screen bg-slate-50 pb-20">
                            <div className="teal-theme text-white pt-16 pb-20 px-8 rounded-b-[3rem] text-center shadow-lg">
                                <div className="w-20 h-20 bg-white rounded-full mx-auto mb-4 flex items-center justify-center text-3xl shadow-md border-4 border-white/20">👤</div>
                                <h2 className="text-xl font-black uppercase tracking-tight">{profile?.name || user?.email}</h2>
                                <p className="text-[10px] font-bold opacity-70 mt-1 uppercase tracking-widest">Pelamar Aktif</p>
                            </div>
                            <div className="px-6 -mt-10 space-y-4">
                                <div className="bg-white p-6 rounded-3xl border shadow-sm flex justify-between items-center active:scale-95 transition-all">
                                    <div><h3 className="font-black text-sm text-slate-800 uppercase">Kirim Lamaran</h3><p className="text-[10px] text-slate-400">Pilih posisi & upload biodata</p></div>
                                    <div className="text-2xl">📝</div>
                                </div>
                                <button onClick={() => auth.signOut().then(() => window.location.reload())} className="w-full py-4 text-red-500 font-bold uppercase text-[10px] tracking-widest mt-10">Logout Sistem</button>
                            </div>
                        </div>
                    )}

                    {/* Loader */}
                    {loading && <div className="fixed inset-0 bg-white/80 z-[300] flex items-center justify-center text-3xl animate-spin">⏳</div>}
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
