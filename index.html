<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>UAT - Sistem Rekrutmen Enterprise</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/htm@3.1.1/dist/htm.umd.js"></script>

    <!-- Firebase SDK Compat -->
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;700;800&display=swap');
        * { font-family: 'Plus Jakarta Sans', sans-serif; -webkit-tap-highlight-color: transparent; }
        body { background-color: #f8fafc; margin: 0; }
        .teal-bg { background-color: #1abc9c; }
        .teal-text { color: #1abc9c; }
        .animate-in { animation: fadeIn 0.4s ease-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; } }
    </style>
</head>
<body>
    <div id="root"></div>

    <script>
        const { useState, useEffect } = React;
        const html = htm.bind(React.createElement);

        // CONFIG FIREBASE (Data Bersih Tanpa Karakter Tersembunyi)
        const firebaseConfig = {
            apiKey: "AIzaSyAg2NSb0rqD6BNtu96_7VJezhGiUlYyIZM",
            authDomain: "hire-1a51d.firebaseapp.com",
            projectId: "hire-1a51d",
            storageBucket: "hire-1a51d.firebasestorage.app",
            messagingSenderId: "370568295",
            appId: "1:370568295:web:a0d38b16b3bde89cbbf8c2"
        };

        if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        const db = firebase.firestore();
        const APP_ID = "v35_uat_stable";

        function App() {
            const [view, setView] = useState('login'); 
            const [mode, setMode] = useState('real'); // real, demo
            const [userEmail, setUserEmail] = useState('');
            const [loading, setLoading] = useState(false);

            // Auth Listeners
            useEffect(() => {
                const unsub = auth.onAuthStateChanged(u => {
                    if (u && mode === 'real') {
                        setUserEmail(u.email);
                        setView(u.email.includes('admin') ? 'admin' : 'dashboard');
                    }
                });
                return () => unsub();
            }, [mode]);

            const handleAuth = async (isSignup, email, pass) => {
                setLoading(true);
                try {
                    if (isSignup) await auth.createUserWithEmailAndPassword(email, pass);
                    else await auth.signInWithEmailAndPassword(email, pass);
                } catch (err) {
                    alert("DATABASE OFFLINE: " + err.message + "\n\nGunakan 'MODE DEMO' untuk UAT.");
                }
                setLoading(false);
            };

            // --- KOMPONEN UI ---

            const LoginView = () => {
                const [emailField, setEmailField] = useState('');
                const [passField, setPassField] = useState('');
                const [isSignup, setIsSignup] = useState(false);

                return html`
                    <div class="min-h-screen flex flex-col justify-center p-8 max-w-md mx-auto bg-white animate-in">
                        <div class="text-center mb-10">
                            <div class="text-6xl mb-4">👟</div>
                            <h1 class="text-3xl font-black text-slate-800 tracking-tighter leading-none">HIREPRO</h1>
                            <p class="text-[10px] font-bold text-slate-400 mt-2 uppercase tracking-widest leading-none italic">Sistem Rekrutmen Enterprise</p>
                        </div>

                        <form class="space-y-4" onSubmit=${e => { e.preventDefault(); handleAuth(isSignup, emailField, passField); }}>
                            <input class="w-full p-4 bg-slate-50 border border-slate-100 rounded-2xl outline-none text-sm" placeholder="Email" value=${emailField} onChange=${e => setEmailField(e.target.value)} required />
                            <input class="w-full p-4 bg-slate-50 border border-slate-100 rounded-2xl outline-none text-sm" type="password" placeholder="Password" value=${passField} onChange=${e => setPassField(e.target.value)} required />
                            <button type="submit" class="w-full teal-bg text-white font-black py-4 rounded-3xl shadow-xl uppercase text-xs tracking-widest">
                                ${loading ? 'SINKRONISASI...' : (isSignup ? 'DAFTAR SEKARANG' : 'MASUK SISTEM')}
                            </button>
                        </form>

                        <button onClick=${() => setIsSignup(!isSignup)} class="mt-6 text-[10px] font-bold text-slate-300 underline uppercase block mx-auto">
                            ${isSignup ? 'Sudah punya akun? Login' : 'Belum punya akun? Daftar'}
                        </button>

                        <!-- TOMBOL UAT (SANGAT PENTING) -->
                        <div class="mt-12 p-6 bg-slate-50 border-2 border-dashed border-slate-200 rounded-[2.5rem] text-center">
                            <p class="text-[10px] font-black text-slate-400 uppercase mb-3 italic">Keperluan UAT / Demo Pimpinan:</p>
                            <button onClick=${() => { setMode('demo'); setView('admin'); setUserEmail('admin@pabrik.com'); }} class="w-full py-3 border-2 border-[#1abc9c] text-[#1abc9c] font-black rounded-2xl uppercase text-[10px] active:bg-[#1abc9c] active:text-white transition-all">
                                MASUK MODE DEMO (UAT)
                            </button>
                        </div>
                    </div>
                `;
            };

            const AdminDashboard = () => html`
                <div class="min-h-screen bg-slate-50 max-w-md mx-auto animate-in pb-20">
                    <div class="bg-slate-900 text-white p-10 pt-16 rounded-b-[4rem] text-center shadow-2xl">
                        <h2 class="text-2xl font-black uppercase tracking-tighter italic leading-none tracking-widest">ADMIN CONTROL</h2>
                        <p class="text-[9px] font-bold opacity-30 uppercase mt-2 italic tracking-[0.2em]">PT SEPATU INDONESIA ${mode === 'demo' ? '(MODE DEMO)' : ''}</p>
                    </div>
                    <div class="p-8">
                        <div class="flex justify-between items-center mb-6 px-2">
                            <h3 class="text-[10px] font-black text-slate-400 uppercase tracking-widest">Pelamar Masuk (UAT)</h3>
                            <div class="w-2 h-2 bg-green-500 rounded-full animate-pulse"></div>
                        </div>
                        
                        <div class="space-y-3">
                            <div class="bg-white p-5 rounded-[2rem] border shadow-sm flex items-center justify-between">
                                <div class="flex items-center gap-3">
                                    <div class="w-12 h-12 bg-teal-50 text-2xl rounded-2xl flex items-center justify-center">👤</div>
                                    <div class="text-left">
                                        <h4 class="font-black text-sm text-slate-800 leading-none mb-1 uppercase">Dey (Contoh)</h4>
                                        <p class="text-[9px] font-bold text-blue-600 uppercase">Operator Sewing</p>
                                    </div>
                                </div>
                                <div class="text-xl">📞</div>
                            </div>
                            
                            <div class="bg-white p-5 rounded-[2rem] border shadow-sm flex items-center justify-between opacity-60">
                                <div class="flex items-center gap-3">
                                    <div class="w-12 h-12 bg-slate-50 text-2xl rounded-2xl flex items-center justify-center">👤</div>
                                    <div class="text-left">
                                        <h4 class="font-black text-sm text-slate-800 leading-none mb-1 uppercase">Budi (Dummy)</h4>
                                        <p class="text-[9px] font-bold text-slate-400 uppercase">Quality Control</p>
                                    </div>
                                </div>
                                <div class="px-3 py-1 bg-green-100 text-green-600 rounded-full text-[8px] font-black">LOLOS</div>
                            </div>
                        </div>

                        <button onClick=${() => window.location.reload()} class="w-full py-5 text-red-500 font-bold uppercase text-[10px] tracking-widest mt-20">Keluar Sistem</button>
                    </div>
                </div>
            `;

            if (view === 'admin') return AdminDashboard();
            if (view === 'dashboard') return html`<div class="p-20 text-center"><h1 class="font-black">DASHBOARD PELAMAR AKTIF</h1><button onClick=${() => window.location.reload()}>Logout</button></div>`;
            return LoginView();
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(React.createElement(App));
    </script>
</body>
</html>

```
